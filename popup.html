<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Try-On</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --surface: #f9fafb;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --accent: #000000;
            --accent-text: #ffffff;
            --radius-sm: 8px;
            --radius-md: 12px;
            --spacing-sm: 10px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
        }

        body {
            width: 380px;
            min-height: 560px;
            padding: var(--spacing-lg);
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-main);
            overflow: hidden;
        }

        h2 {
            font-weight: 600;
            margin-top: 0;
            margin-bottom: var(--spacing-lg);
            text-align: center;
            font-size: 20px;
            letter-spacing: -0.02em;
            color: var(--text-main);
        }

        #mainContent {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
        }

        #cachedImages, #productImages {
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing-sm);
            width: 100%;
        }

        #productImages {
            max-height: 180px;
            overflow-y: auto;
            padding-bottom: 5px;
            justify-content: flex-start;
        }
        
        /* Custom Scrollbar for minimal look */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #d1d5db;
        }

        .cached-image, .product-image, #uploadNewImage {
            width: 72px;
            height: 72px;
            object-fit: cover;
            border-radius: var(--radius-sm);
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s ease;
            background: var(--surface);
        }

        .cached-image:hover, .product-image:hover, #uploadNewImage:hover {
            border-color: var(--border);
        }

        .cached-image.selected, .product-image.selected {
            border: 2px solid var(--accent);
            transform: scale(0.98);
        }

        #uploadNewImage {
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-muted);
            font-size: 24px;
            font-weight: 400;
            position: relative;
            overflow: hidden;
            border: 1px dashed #d1d5db;
            background: transparent;
        }
        
        #uploadNewImage:hover {
            background: #f3f4f6;
            border-style: solid;
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: var(--accent-text);
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: transform 0.1s ease, background 0.2s ease;
            font-family: inherit;
        }

        button:hover:not(:disabled) {
            background: #1f2937;
        }
        
        button:active:not(:disabled) {
            transform: scale(0.98);
        }

        button:disabled {
            background: var(--surface);
            color: var(--text-muted);
            cursor: not-allowed;
            border: 1px solid var(--border);
        }

        .loader {
            border: 2px solid var(--border);
            border-top: 2px solid var(--accent);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
            margin: var(--spacing-lg) auto;
            display: none;
        }

        #loadingMessage {
            text-align: center;
            color: var(--text-muted);
            margin-top: var(--spacing-sm);
            display: none;
            font-size: 14px;
            font-weight: 400;
        }

        #result {
            text-align: center;
            font-size: 14px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        #result img {
            max-width: 100%;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }

        .image-container {
            position: relative;
            width: 72px;
            height: 72px;
        }

        .delete-btn {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #ef4444;
            color: white;
            border: none;
            font-size: 12px;
            line-height: 1;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: 10;
            padding: 0;
        }

        .image-container:hover .delete-btn {
            opacity: 1;
        }

        .download-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 12px;
            border-radius: var(--radius-md);
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s ease;
            font-family: inherit;
        }
        
        .download-btn:hover {
            background: #f3f4f6;
        }

        #productTitle {
            font-size: 14px;
            margin: 0;
            color: var(--text-main);
            font-weight: 500;
            width: 100%;
        }

        footer {
            margin-top: 10px;
            color: var(--text-muted);
            font-size: 12px;
            text-align: center;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <h2>STYLE YOURSELF WITH VIRTUAL TRY ON</h2>
    <div id="mainContent">
        <div id="cachedImages">
        </div>
        
        <h3 id="productTitle" style="display: none;">Choose Clothing</h3>
        <div id="productImages">
        </div>

        <button id="tryOn" disabled>Try On</button>
        <div id="loader" class="loader"></div>
        <div id="loadingMessage">It may take around 30s to dress up the person</div>
        <div id="result">
            <p style="margin-top: 40px;"><a href="#" target="_blank"></a></p>
        </div>
        <input type="file" id="personImage" accept="image/*" style="display: none;">
    </div>
    <script src="utils.js"></script>
    <script src="popup.js"></script>
    <footer>
        Created with love ❤️    -Harshit Dhyani
    </footer>
</body>
</html>
